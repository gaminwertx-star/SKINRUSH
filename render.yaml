# Render Blueprint — creates the web service + a persistent PostgreSQL database.
# In Render: New → Blueprint → connect this repo. It reads this file automatically.
databases:
  - name: skinrush-db
    plan: free

services:
  - type: web
    name: skinrush
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py seed &&
      python manage.py ensure_admin
    startCommand: gunicorn skinrush.wsgi:application
    envVars:
      # Postgres connection string, injected automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: skinrush-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Pin a Python version that has prebuilt wheels for psycopg.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Hidden admin panel login (reached only at /adminpanel).
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
