# Fly.io config for SKINRUSH.
# The app name is set by `fly launch` (must be globally unique) — if you edit
# it here, keep it in sync with the deployed app.
app = "skinrush"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
