<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKINRUSH — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css?v=4" />
</head>
<body>
  <!-- LOGIN -->
  <div class="login" id="loginView" hidden>
    <form class="login__card" id="loginForm">
      <div class="login__logo">SKIN<span>RUSH</span></div>
      <div class="login__sub">Boshqaruv paneli</div>
      <input class="login__input" id="loginUser" placeholder="Login" autocomplete="username" />
      <input class="login__input" id="loginPass" type="password" placeholder="Parol" autocomplete="current-password" />
      <div class="login__error" id="loginError"></div>
      <button class="login__btn" type="submit" id="loginBtn">Kirish</button>
    </form>
  </div>

  <!-- APP -->
  <div class="app" id="appView" hidden>
    <aside class="sidebar">
      <div class="sidebar__logo">SKIN<span>RUSH</span></div>
      <div class="sidebar__tag">ADMIN</div>
      <nav class="sidebar__nav" id="nav">
        <button class="nav-item is-active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="users">Foydalanuvchilar</button>
        <button class="nav-item" data-view="withdraws">
          Withdraw so'rovlari <span class="nav-badge" id="wdBadge" hidden></span>
        </button>
        <button class="nav-item" data-view="topups">
          To'lov chat <span class="nav-badge" id="tuBadge" hidden></span>
        </button>
        <button class="nav-item" data-view="payadmins">To'lov adminlar</button>
        <button class="nav-item" data-view="promos">Promokodlar</button>
        <button class="nav-item" data-view="cases">Keyslar</button>
      </nav>
      <div class="sidebar__foot">
        <div class="sidebar__user"><span class="sidebar__dot"></span><span id="whoami"></span></div>
        <button class="sidebar__logout" id="logoutBtn">Chiqish</button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <!-- REJECT MODAL (withdraw) -->
  <div class="modal" id="rejectModal" hidden>
    <div class="modal__card">
      <div class="modal__title">So'rovni rad etish</div>
      <div class="modal__sub" id="rejectSub"></div>
      <textarea class="admin-input modal__area" id="rejectReason" rows="3"
                placeholder="Sabab — foydalanuvchiga shu matn yuboriladi"></textarea>
      <div class="modal__error" id="rejectError"></div>
      <div class="modal__acts">
        <button class="admin-btn admin-btn--ghost" id="rejectCancel">Bekor qilish</button>
        <button class="admin-btn admin-btn--danger" id="rejectConfirm">Rad etish</button>
      </div>
    </div>
  </div>

  <!-- GENERIC CONFIRM -->
  <div class="modal" id="confirmModal" hidden>
    <div class="modal__card">
      <div class="modal__title" id="confirmTitle"></div>
      <div class="modal__sub" id="confirmSub"></div>
      <div class="modal__acts">
        <button class="admin-btn admin-btn--ghost" id="confirmCancel">Bekor qilish</button>
        <button class="admin-btn admin-btn--danger" id="confirmOk">Ha</button>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js?v=8"></script>
</body>
</html>
